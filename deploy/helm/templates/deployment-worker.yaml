{{- if .Values.queue.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "career2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.queue.replicaCount }}
  selector:
    matchLabels:
      {{- include "career2.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "career2.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - php
            - artisan
            - queue:work
            - --tries={{ .Values.queue.tries }}
            - --timeout={{ .Values.queue.timeout }}
            - --memory={{ .Values.queue.memory }}
            - --sleep={{ .Values.queue.sleep }}
          env:
            {{- include "career2.env" . | nindent 12 }}
          {{- with .Values.resources.worker }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
