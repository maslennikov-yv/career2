{{- if .Values.scheduler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-scheduler
  labels:
    {{- include "career2.labels" . | nindent 4 }}
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 55
      template:
        metadata:
          labels:
            {{- include "career2.labels" . | nindent 12 }}
            app.kubernetes.io/component: scheduler
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scheduler
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - php
                - artisan
                - schedule:run
              env:
                {{- include "career2.env" . | nindent 16 }}
              {{- with .Values.resources.scheduler }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
