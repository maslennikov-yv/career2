apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app
  labels:
    {{- include "career2.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ .Values.app.key | required "app.key обязателен — задайте в values-<ENV>.local.yaml (php artisan key:generate --show)" | quote }}
  STATS_SYSTEM_USER_PASSWORD: {{ .Values.app.systemUserPassword | default "" | quote }}
