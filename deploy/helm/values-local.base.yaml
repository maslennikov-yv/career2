# Не-секретные env-specific параметры career2 (local).
# Подаётся в values.yaml.gotmpl через gomplate -d base=...
# Сюда переехало содержимое apps/conf/career2/local/app.yaml (контракт infra-interface v2).
replicaCount: 1

app:
  env: local
  debug: "true"
  logChannel: stack
  logLevel: debug
  trustedProxies: ""
  url: "http://career2.local"

queue:
  replicaCount: 1

ingress:
  enabled: true
  host: career2.local
  annotations: {}

resources:
  web:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  worker:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi
  scheduler:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi
